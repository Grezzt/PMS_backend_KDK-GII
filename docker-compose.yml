# =============================================================================
# PMS Backend — Docker Compose
# Services:
#   - postgres    : PostgreSQL 16 (Prisma / relational data)
#   - mongo       : MongoDB 7 (user_tokens & audit_logs)
#   - redis       : Redis (Moleculer cacher)
#   - nats        : NATS JetStream (Moleculer transporter)
#   - prisma-studio : Prisma Studio GUI (localhost:5555)
#   - api         : PMS Backend (Moleculer)
#   - traefik     : Reverse Proxy
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # POSTGRESQL — Relational Database (via Prisma)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pms_user
      POSTGRES_PASSWORD: pms_password
      POSTGRES_DB: pms_db
    ports:
      - "5433:5432"         # Port 5433 di host → 5432 di container (hindari konflik local PG)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pms_user -d pms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PRISMA STUDIO — GUI Database Browser (PostgreSQL)
  # Akses: http://localhost:5555
  # ---------------------------------------------------------------------------
  prisma-studio:
    image: node:22-alpine
    container_name: pms_prisma_studio
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pms_user}:${POSTGRES_PASSWORD:-pms_password}@postgres:5432/${POSTGRES_DB:-pms_db}
    command: sh -c "npm install && npx prisma generate && npx prisma studio --port 5555 --browser none"
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - default

  # ---------------------------------------------------------------------------
  # MONGODB — NoSQL Database (user_tokens & audit_logs)
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: pms_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-pms_mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-pms_mongo_pass}
      MONGO_INITDB_DATABASE: pms_nosql
    ports:
      - "27017:27017"       # Expose ke host untuk debugging
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # REDIS — Cache (Moleculer Cacher)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pms_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # NATS — Message Broker (Moleculer Transporter)
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2-alpine
    container_name: pms_nats
    restart: unless-stopped
    command: ["-js", "--http_port", "8222"]
    ports:
      - "4222:4222"         # Client connections
      - "8222:8222"         # HTTP monitoring
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # PMS API — Moleculer Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: pms-backend:latest
    container_name: pms_api
    restart: unless-stopped
    env_file: docker-compose.env
    environment:
      SERVICES: api,auth,users,workspaces,projects
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pms_user}:${POSTGRES_PASSWORD:-pms_password}@postgres:5432/${POSTGRES_DB:-pms_db}
      MONGO_URI: mongodb://${MONGO_USER:-pms_mongo}:${MONGO_PASSWORD:-pms_mongo_pass}@mongo:27017/pms_nosql?authSource=admin
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gw.rule=PathPrefix(`/`)"
      - "traefik.http.services.api-gw.loadbalancer.server.port=3000"
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # TRAEFIK — Reverse Proxy & Load Balancer
  # Dashboard: http://localhost:3001
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.3
    container_name: pms_traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "3000:80"           # API via Traefik
      - "3001:8080"         # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
      - default

# =============================================================================
# NETWORKS & VOLUMES
# =============================================================================
networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
