openapi: 3.0.3
info:
    title: PMS Backend API
    version: 1.0.0
    description: API documentation for PMS Backend.
servers:
    - url: http://localhost:3000
      description: Local development
components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
    responses:
        BadRequest:
            description: Bad request
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        Unauthorized:
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        Forbidden:
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        NotFound:
            description: Not found
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        Conflict:
            description: Conflict
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        Unprocessable:
            description: Validation error
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        InternalError:
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
    schemas:
        ErrorResponse:
            type: object
            properties:
                name:
                    type: string
                message:
                    type: string
                code:
                    type: integer
                type:
                    type: string
        AuthTokens:
            type: object
            properties:
                accessToken:
                    type: string
                refreshToken:
                    type: string
                expiresIn:
                    type: string
        User:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                email:
                    type: string
                role:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
        Workspace:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                description:
                    type: string
                ownerId:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
        Project:
            type: object
            properties:
                id:
                    type: string
                workspaceId:
                    type: string
                name:
                    type: string
                description:
                    type: string
                visibility:
                    type: string
                statusConfig:
                    type: object
                leaderId:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
        Document:
            type: object
            properties:
                id:
                    type: string
                projectId:
                    type: string
                fileName:
                    type: string
                storageKey:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
        TaskAttachment:
            type: object
            properties:
                id:
                    type: string
                taskId:
                    type: string
                fileName:
                    type: string
                fileUrl:
                    type: string
                uploadedBy:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
security:
    - bearerAuth: []
paths:
    /api/auth/register:
        post:
            tags: [Auth]
            summary: Register user
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                email:
                                    type: string
                                password:
                                    type: string
                            required: [name, email, password]
            responses:
                "200":
                    description: Registered
                "409":
                    $ref: "#/components/responses/Conflict"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/auth/login:
        post:
            tags: [Auth]
            summary: Login
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                email:
                                    type: string
                                password:
                                    type: string
                            required: [email, password]
            responses:
                "200":
                    description: Tokens
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AuthTokens"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/auth/me:
        get:
            tags: [Auth]
            summary: Get current user
            responses:
                "200":
                    description: Current user
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    user:
                                        $ref: "#/components/schemas/User"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/auth/refresh:
        post:
            tags: [Auth]
            summary: Refresh access token
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                refreshToken:
                                    type: string
                            required: [refreshToken]
            responses:
                "200":
                    description: New access token
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/auth/logout:
        post:
            tags: [Auth]
            summary: Logout
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                refreshToken:
                                    type: string
                            required: [refreshToken]
            responses:
                "200":
                    description: Logged out
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/users/me:
        get:
            tags: [Users]
            summary: Get current user profile
            responses:
                "200":
                    description: Profile
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
        patch:
            tags: [Users]
            summary: Update current user profile
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                email:
                                    type: string
                                password:
                                    type: string
                                currentPassword:
                                    type: string
            responses:
                "200":
                    description: Updated
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "409":
                    $ref: "#/components/responses/Conflict"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/users/{id}:
        get:
            tags: [Users]
            summary: Get user by id
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: User
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    user:
                                        $ref: "#/components/schemas/User"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/users:
        get:
            tags: [Users]
            summary: List users (admin only)
            parameters:
                - name: page
                  in: query
                  schema:
                      type: integer
                - name: limit
                  in: query
                  schema:
                      type: integer
                - name: search
                  in: query
                  schema:
                      type: string
            responses:
                "200":
                    description: User list
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/workspaces:
        get:
            tags: [Workspaces]
            summary: List workspaces
            responses:
                "200":
                    description: Workspaces
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/Workspace"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "500":
                    $ref: "#/components/responses/InternalError"
        post:
            tags: [Workspaces]
            summary: Create workspace
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                description:
                                    type: string
                                members:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            userId:
                                                type: string
                                            role:
                                                type: string
            responses:
                "200":
                    description: Workspace created
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Workspace"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/workspaces/{id}:
        get:
            tags: [Workspaces]
            summary: Get workspace by id
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: Workspace
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Workspace"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
        patch:
            tags: [Workspaces]
            summary: Update workspace
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                description:
                                    type: string
            responses:
                "200":
                    description: Workspace updated
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
        delete:
            tags: [Workspaces]
            summary: Delete workspace
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: Workspace deleted
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/workspaces/{workspaceId}/members:
        post:
            tags: [Workspaces]
            summary: Add workspace member
            parameters:
                - name: workspaceId
                  in: path
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                userId:
                                    type: string
                                role:
                                    type: string
            responses:
                "200":
                    description: Member upserted
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/projects:
        get:
            tags: [Projects]
            summary: List projects
            parameters:
                - name: workspaceId
                  in: query
                  schema:
                      type: string
            responses:
                "200":
                    description: Projects
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/Project"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "500":
                    $ref: "#/components/responses/InternalError"
        post:
            tags: [Projects]
            summary: Create project
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                workspaceId:
                                    type: string
                                name:
                                    type: string
                                description:
                                    type: string
                                visibility:
                                    type: string
                                statusConfig:
                                    type: object
            responses:
                "200":
                    description: Project created
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Project"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/projects/{id}:
        get:
            tags: [Projects]
            summary: Get project by id
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: Project
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Project"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
        patch:
            tags: [Projects]
            summary: Update project
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                description:
                                    type: string
                                visibility:
                                    type: string
                                statusConfig:
                                    type: object
            responses:
                "200":
                    description: Project updated
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
        delete:
            tags: [Projects]
            summary: Delete project
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: Project deleted
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/projects/{projectId}/members:
        post:
            tags: [Projects]
            summary: Add project member
            parameters:
                - name: projectId
                  in: path
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                userId:
                                    type: string
                                role:
                                    type: string
            responses:
                "200":
                    description: Member upserted
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/documents:
        get:
            tags: [Documents]
            summary: List documents
            parameters:
                - name: projectId
                  in: query
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: Documents
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/Document"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/documents/upload:
        post:
            tags: [Documents]
            summary: Upload document
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            properties:
                                projectId:
                                    type: string
                                file:
                                    type: string
                                    format: binary
                            required: [projectId, file]
            responses:
                "200":
                    description: Document uploaded
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    document:
                                        $ref: "#/components/schemas/Document"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/documents/{id}:
        get:
            tags: [Documents]
            summary: Get document by id
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: Document
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Document"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
        delete:
            tags: [Documents]
            summary: Delete document
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: Document deleted
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/documents/{id}/download:
        get:
            tags: [Documents]
            summary: Download document (redirect)
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "302":
                    description: Redirect to presigned URL
                    headers:
                        Location:
                            schema:
                                type: string
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/documents/task-attachments:
        post:
            tags: [Documents]
            summary: Upload task attachment
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            properties:
                                taskId:
                                    type: string
                                file:
                                    type: string
                                    format: binary
                            required: [taskId, file]
            responses:
                "200":
                    description: Attachment uploaded
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    attachment:
                                        $ref: "#/components/schemas/TaskAttachment"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/documents/task/{taskId}/attachments:
        get:
            tags: [Documents]
            summary: List task attachments
            parameters:
                - name: taskId
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: Attachments
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/TaskAttachment"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/documents/task-attachments/{id}/download:
        get:
            tags: [Documents]
            summary: Download task attachment (redirect)
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "302":
                    description: Redirect to presigned URL
                    headers:
                        Location:
                            schema:
                                type: string
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/documents/task-attachments/{id}:
        delete:
            tags: [Documents]
            summary: Delete task attachment
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: Attachment deleted
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
