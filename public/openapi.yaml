openapi: 3.0.3
info:
    title: PMS Backend API
    version: 1.0.0
    description: API documentation for PMS Backend.
servers:
    - url: http://localhost:3000
      description: Local development
components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
    responses:
        BadRequest:
            description: Bad request
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        Unauthorized:
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        Forbidden:
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        NotFound:
            description: Not found
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        Conflict:
            description: Conflict
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        Unprocessable:
            description: Validation error
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        InternalError:
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
    schemas:
        Pagination:
            type: object
            properties:
                page:
                    type: integer
                    example: 1
                limit:
                    type: integer
                    example: 20
                total:
                    type: integer
                    example: 42
                totalPages:
                    type: integer
                    example: 3
        ErrorResponse:
            type: object
            properties:
                message:
                    type: string
                    example: "Unauthorized"
                code:
                    type: integer
                    example: 401
                type:
                    type: string
                    example: "ERR_UNAUTHORIZED"
                data:
                    nullable: true
                    example: null
        AuthTokens:
            type: object
            properties:
                accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                refreshToken:
                    type: string
                    example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6"
                expiresIn:
                    type: string
                    example: "1h"
        User:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                name:
                    type: string
                    example: "John Doe"
                email:
                    type: string
                    format: email
                    example: "john.doe@example.com"
                role:
                    type: string
                    enum: [ADMIN, MEMBER]
                    example: "MEMBER"
                createdAt:
                    type: string
                    format: date-time
                    example: "2026-05-13T02:00:00.000Z"
                updatedAt:
                    type: string
                    format: date-time
                    example: "2026-05-13T02:00:00.000Z"
        Workspace:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                    example: "b2c3d4e5-f6a1-2345-bcde-f12345678901"
                name:
                    type: string
                    example: "Product Team"
                description:
                    type: string
                    nullable: true
                    example: "Workspace for product development team"
                ownerId:
                    type: string
                    format: uuid
                    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                createdAt:
                    type: string
                    format: date-time
                    example: "2026-05-01T08:00:00.000Z"
                updatedAt:
                    type: string
                    format: date-time
                    example: "2026-05-10T10:30:00.000Z"
        Project:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                    example: "c3d4e5f6-a1b2-3456-cdef-123456789012"
                workspaceId:
                    type: string
                    format: uuid
                    example: "b2c3d4e5-f6a1-2345-bcde-f12345678901"
                name:
                    type: string
                    example: "Mobile App Redesign"
                description:
                    type: string
                    nullable: true
                    example: "Complete UI/UX overhaul for mobile application"
                visibility:
                    type: string
                    enum: [PUBLIC, PRIVATE]
                    example: "PRIVATE"
                statusConfig:
                    type: object
                    nullable: true
                    example: {"statuses": ["TODO", "IN_PROGRESS", "REVIEW", "DONE"]}
                leaderId:
                    type: string
                    format: uuid
                    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                createdAt:
                    type: string
                    format: date-time
                    example: "2026-05-05T09:00:00.000Z"
                updatedAt:
                    type: string
                    format: date-time
                    example: "2026-05-12T14:00:00.000Z"
        Document:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                    example: "d4e5f6a1-b2c3-4567-defa-234567890123"
                projectId:
                    type: string
                    format: uuid
                    example: "c3d4e5f6-a1b2-3456-cdef-123456789012"
                fileName:
                    type: string
                    example: "requirements-v2.pdf"
                storageKey:
                    type: string
                    example: "documents/c3d4e5f6/uuid-requirements-v2.pdf"
                url:
                    type: string
                    nullable: true
                    example: "https://s3.backblazeb2.com/pms-bucket/documents/c3d4e5f6/uuid-requirements-v2.pdf"
                createdAt:
                    type: string
                    format: date-time
                    example: "2026-05-10T11:00:00.000Z"
                updatedAt:
                    type: string
                    format: date-time
                    example: "2026-05-10T11:00:00.000Z"
        TaskAttachment:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                    example: "e5f6a1b2-c3d4-5678-efab-345678901234"
                taskId:
                    type: string
                    format: uuid
                    example: "f6a1b2c3-d4e5-6789-fabc-456789012345"
                fileName:
                    type: string
                    example: "screenshot-bug-001.png"
                fileUrl:
                    type: string
                    example: "https://s3.backblazeb2.com/pms-bucket/task-attachments/f6a1/uuid-screenshot.png"
                uploadedBy:
                    type: string
                    format: uuid
                    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                url:
                    type: string
                    example: "https://s3.backblazeb2.com/pms-bucket/task-attachments/f6a1/uuid-screenshot.png"
                createdAt:
                    type: string
                    format: date-time
                    example: "2026-05-11T09:30:00.000Z"
                updatedAt:
                    type: string
                    format: date-time
                    example: "2026-05-11T09:30:00.000Z"
        WorkspaceMember:
            type: object
            properties:
                userId:
                    type: string
                    format: uuid
                    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                role:
                    type: string
                    enum: [admin, member, viewer]
                    example: "admin"
                isOwner:
                    type: boolean
                    example: true
                user:
                    type: object
                    properties:
                        id:
                            type: string
                            example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        name:
                            type: string
                            example: "John Doe"
                        email:
                            type: string
                            example: "john.doe@example.com"
        ProjectMember:
            type: object
            properties:
                userId:
                    type: string
                    format: uuid
                    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                role:
                    type: string
                    enum: [admin, member, viewer]
                    example: "admin"
                isLeader:
                    type: boolean
                    example: true
                user:
                    type: object
                    properties:
                        id:
                            type: string
                            example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        name:
                            type: string
                            example: "John Doe"
                        email:
                            type: string
                            example: "john.doe@example.com"
security:
    - bearerAuth: []
paths:
    /api/auth/register:
        post:
            tags: [Auth]
            summary: Register a new user account
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [name, email, password]
                            properties:
                                name:
                                    type: string
                                    minLength: 2
                                    maxLength: 100
                                    example: "John Doe"
                                email:
                                    type: string
                                    format: email
                                    example: "john.doe@example.com"
                                password:
                                    type: string
                                    minLength: 6
                                    example: "secret123"
            responses:
                "201":
                    description: User created successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: "Created"
                                    code:
                                        type: integer
                                        example: 201
                                    type:
                                        type: string
                                        example: "CREATED"
                                    data:
                                        $ref: "#/components/schemas/User"
                            example:
                                message: "Created"
                                code: 201
                                type: "CREATED"
                                data:
                                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                                    name: "John Doe"
                                    email: "john.doe@example.com"
                                    role: "MEMBER"
                                    createdAt: "2026-05-13T02:00:00.000Z"
                                    updatedAt: "2026-05-13T02:00:00.000Z"
                "409":
                    description: Email already registered
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            example:
                                message: "Email already registered"
                                code: 409
                                type: "ERR_EMAIL_EXISTS"
                                data: null
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/auth/login:
        post:
            tags: [Auth]
            summary: Authenticate user and obtain tokens
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email, password]
                            properties:
                                email:
                                    type: string
                                    format: email
                                    example: "john.doe@example.com"
                                password:
                                    type: string
                                    example: "secret123"
            responses:
                "200":
                    description: Authentication successful, returns JWT tokens
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AuthTokens"
                            example:
                                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6ImExYjJjM2Q0LWU1ZjYtNzg5MC1hYmNkLWVmMTIzNDU2Nzg5MCIsImVtYWlsIjoiam9obi5kb2VAZXhhbXBsZS5jb20iLCJpYXQiOjE3NDcxMDg4MDB9.SIG"
                                refreshToken: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
                                expiresIn: "1h"
                "401":
                    description: Invalid credentials
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            example:
                                message: "Invalid email or password"
                                code: 401
                                type: "ERR_INVALID_CREDS"
                                data: null
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/auth/me:
        get:
            tags: [Auth]
            summary: Get authenticated user profile
            responses:
                "200":
                    description: Current user profile
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                    code:
                                        type: integer
                                    type:
                                        type: string
                                    data:
                                        $ref: "#/components/schemas/User"
                            example:
                                message: "OK"
                                code: 200
                                type: "SUCCESS"
                                data:
                                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                                    name: "John Doe"
                                    email: "john.doe@example.com"
                                    role: "MEMBER"
                                    createdAt: "2026-05-13T02:00:00.000Z"
                                    updatedAt: "2026-05-13T02:00:00.000Z"
                "401":
                    description: Token invalid or user no longer exists
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            example:
                                message: "Unauthorized"
                                code: 401
                                type: "ERR_UNAUTHORIZED"
                                data: null
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/auth/refresh:
        post:
            tags: [Auth]
            summary: Refresh access token using refresh token
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [refreshToken]
                            properties:
                                refreshToken:
                                    type: string
                                    example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
            responses:
                "200":
                    description: New access token issued
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    accessToken:
                                        type: string
                                    expiresIn:
                                        type: string
                            example:
                                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                                expiresIn: "1h"
                "401":
                    description: Refresh token invalid, revoked, or expired
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            example:
                                message: "Unauthorized"
                                code: 401
                                type: "ERR_UNAUTHORIZED"
                                data: null
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/auth/logout:
        post:
            tags: [Auth]
            summary: Revoke refresh token (logout)
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [refreshToken]
                            properties:
                                refreshToken:
                                    type: string
                                    example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
            responses:
                "204":
                    description: Logged out successfully — no content
                "404":
                    description: Refresh token not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            example:
                                message: "Not Found"
                                code: 404
                                type: "ERR_NOT_FOUND"
                                data: null
                "422":
                    $ref: "#/components/responses/Unprocessable"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/users/me:
        get:
            tags: [Users]
            summary: Get current authenticated user profile
            responses:
                "200":
                    description: User profile retrieved
                    content:
                        application/json:
                            example:
                                message: "OK"
                                code: 200
                                type: "SUCCESS"
                                data:
                                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                                    name: "John Doe"
                                    email: "john.doe@example.com"
                                    role: "MEMBER"
                                    createdAt: "2026-05-13T02:00:00.000Z"
                                    updatedAt: "2026-05-13T02:00:00.000Z"
                "401":
                    description: Unauthorized
                    content:
                        application/json:
                            example:
                                message: "Unauthorized"
                                code: 401
                                type: "ERR_UNAUTHORIZED"
                                data: null
                "500":
                    $ref: "#/components/responses/InternalError"
        patch:
            tags: [Users]
            summary: Update current user profile (partial update)
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    minLength: 2
                                    maxLength: 100
                                    example: "Jane Doe"
                                email:
                                    type: string
                                    format: email
                                    example: "jane.doe@example.com"
                                password:
                                    type: string
                                    minLength: 6
                                    example: "newsecret123"
                                currentPassword:
                                    type: string
                                    example: "secret123"
            responses:
                "200":
                    description: Profile updated
                    content:
                        application/json:
                            example:
                                message: "OK"
                                code: 200
                                type: "SUCCESS"
                                data:
                                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                                    name: "Jane Doe"
                                    email: "jane.doe@example.com"
                                    role: "MEMBER"
                                    createdAt: "2026-05-13T02:00:00.000Z"
                                    updatedAt: "2026-05-13T09:00:00.000Z"
                "400":
                    description: currentPassword required when changing password
                    content:
                        application/json:
                            example:
                                message: "Bad Request"
                                code: 400
                                type: "ERR_BAD_REQUEST"
                                data: null
                "401":
                    description: Unauthorized or current password incorrect
                    content:
                        application/json:
                            example:
                                message: "Current password is incorrect"
                                code: 401
                                type: "ERR_WRONG_PASSWORD"
                                data: null
                "409":
                    description: Email already in use
                    content:
                        application/json:
                            example:
                                message: "Email already used"
                                code: 409
                                type: "ERR_CONFLICT"
                                data: null
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/users/{id}:
        get:
            tags: [Users]
            summary: Get user profile by ID
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            responses:
                "200":
                    description: User profile
                    content:
                        application/json:
                            example:
                                message: "OK"
                                code: 200
                                type: "SUCCESS"
                                data:
                                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                                    name: "John Doe"
                                    email: "john.doe@example.com"
                                    role: "MEMBER"
                                    createdAt: "2026-05-13T02:00:00.000Z"
                                    updatedAt: "2026-05-13T02:00:00.000Z"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    description: User not found
                    content:
                        application/json:
                            example:
                                message: "Not Found"
                                code: 404
                                type: "ERR_NOT_FOUND"
                                data: null
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/users:
        get:
            tags: [Users]
            summary: List all users (admin only)
            parameters:
                - name: page
                  in: query
                  schema:
                      type: integer
                      default: 1
                  example: 1
                - name: limit
                  in: query
                  schema:
                      type: integer
                      default: 20
                      maximum: 100
                  example: 20
                - name: search
                  in: query
                  schema:
                      type: string
                  example: "john"
            responses:
                "200":
                    description: Paginated list of users
                    content:
                        application/json:
                            example:
                                message: "OK"
                                code: 200
                                type: "SUCCESS"
                                data:
                                    list:
                                        - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                                          name: "John Doe"
                                          email: "john.doe@example.com"
                                          role: "MEMBER"
                                          createdAt: "2026-05-13T02:00:00.000Z"
                                          updatedAt: "2026-05-13T02:00:00.000Z"
                                        - id: "b2c3d4e5-f6a1-2345-bcde-f12345678901"
                                          name: "Jane Smith"
                                          email: "jane.smith@example.com"
                                          role: "ADMIN"
                                          createdAt: "2026-05-10T08:00:00.000Z"
                                          updatedAt: "2026-05-10T08:00:00.000Z"
                                    pagination:
                                        page: 1
                                        limit: 20
                                        total: 2
                                        totalPages: 1
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    description: Admin access required
                    content:
                        application/json:
                            example:
                                message: "Forbidden"
                                code: 403
                                type: "ERR_FORBIDDEN"
                                data: null
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/workspaces:
        get:
            tags: [Workspaces]
            summary: List workspaces (owned or member)
            parameters:
                - name: page
                  in: query
                  schema: {type: integer, default: 1}
                - name: limit
                  in: query
                  schema: {type: integer, default: 20, maximum: 100}
            responses:
                "200":
                    description: Paginated workspace list
                    content:
                        application/json:
                            example:
                                message: "OK"
                                code: 200
                                type: "SUCCESS"
                                data:
                                    list:
                                        - id: "b2c3d4e5-f6a1-2345-bcde-f12345678901"
                                          name: "Product Team"
                                          description: "Workspace for product development team"
                                          ownerId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                                          createdAt: "2026-05-01T08:00:00.000Z"
                                          updatedAt: "2026-05-10T10:30:00.000Z"
                                    pagination:
                                        page: 1
                                        limit: 20
                                        total: 1
                                        totalPages: 1
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "500":
                    $ref: "#/components/responses/InternalError"
        post:
            tags: [Workspaces]
            summary: Create a new workspace
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [name]
                            properties:
                                name:
                                    type: string
                                    example: "Product Team"
                                description:
                                    type: string
                                    example: "Workspace for product development team"
                                members:
                                    type: array
                                    items:
                                        type: object
                                        properties:
                                            userId:
                                                type: string
                                                format: uuid
                                                example: "b2c3d4e5-f6a1-2345-bcde-f12345678901"
                                            role:
                                                type: string
                                                enum: [admin, member, viewer]
                                                example: "member"
            responses:
                "201":
                    description: Workspace created
                    content:
                        application/json:
                            example:
                                message: "Created"
                                code: 201
                                type: "CREATED"
                                data:
                                    id: "b2c3d4e5-f6a1-2345-bcde-f12345678901"
                                    name: "Product Team"
                                    description: "Workspace for product development team"
                                    ownerId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                                    createdAt: "2026-05-13T02:00:00.000Z"
                                    updatedAt: "2026-05-13T02:00:00.000Z"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "422":
                    description: Some member userIds do not exist
                    content:
                        application/json:
                            example:
                                message: "Unprocessable Entity"
                                code: 422
                                type: "ERR_UNPROCESSABLE_ENTITY"
                                data:
                                    missingUserIds: ["b2c3d4e5-f6a1-2345-bcde-f12345678901"]
                "500":
                    $ref: "#/components/responses/InternalError"
