<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>PMS Backend Swagger</title>
		<link rel="stylesheet" href="/swagger/vendor/swagger-ui.css" />
		<style>
			body {
				margin: 0;
				background: #fafafa;
			}
		</style>
	</head>
	<body>
		<div id="swagger-ui"></div>
		<script src="/swagger/vendor/swagger-ui-bundle.js"></script>
		<script src="/swagger/vendor/swagger-ui-standalone-preset.js"></script>
		<script>
			window.onload = function () {
				SwaggerUIBundle({
					url: "/openapi.yaml",
					dom_id: "#swagger-ui",
					deepLinking: true,
					presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
					layout: "StandaloneLayout"
				});
			};
		</script>
	</body>
</html>
